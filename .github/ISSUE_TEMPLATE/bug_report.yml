name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug.
        
        For security vulnerabilities, do not open a public issue. Use the Security Advisory flow from the issue chooser.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I can reproduce this with current main or the latest release
          required: false

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the issue
      placeholder: Agent stays in Waking phase forever
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Create PVCExplorer for pvc X
        2. Click Browse Files
        3. Observe phase remains Waking
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Controller (reconciliation)
        - API (REST/WebSocket)
        - UI
        - Auth/Security
        - Docs
        - CI/Release
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is blocked or degraded? Include severity if known.
      placeholder: Browsing is unavailable for all explorers in one namespace.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: pvc-explorer version
      description: Output from Settings page (or /api/version)
      placeholder: v0.1.0-5-gabcdef1
    validations:
      required: false

  - type: input
    id: install_method
    attributes:
      label: Install method
      description: How is pvc-explorer installed?
      placeholder: kustomize config/default, Helm chart, install bundle, make deploy
    validations:
      required: false

  - type: input
    id: k8s
    attributes:
      label: Kubernetes version
      placeholder: v1.30.2
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - kind
        - k3d
        - EKS
        - GKE
        - AKS
        - Other
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser and version (UI bugs)
      placeholder: Chrome 137, Firefox 129
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
      description: Include controller logs/events if available. Redact secrets and tokens.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that helps reproduce or triage this issue.
