name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks-pr:
    if: github.event_name == 'pull_request'
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (PR no-secrets path)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            git --repo-path=/repo --config=/repo/.gitleaks.toml --redact --exit-code 1

  gitleaks-trusted:
    if: github.event_name != 'pull_request'
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml
