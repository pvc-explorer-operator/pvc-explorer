name: OpenSSF Baseline Scan

"on":
    push:
        branches: [main]
    schedule:
        - cron: "0 9 * * 1"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    osps-assessment:
        name: OSPS Assessment
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate OSPS scanner token
              env:
                  OSPS_TOKEN: ${{ secrets.PVTR_GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  if [ -z "${OSPS_TOKEN:-}" ]; then
                      echo "Missing required secret: PVTR_GITHUB_TOKEN" >&2
                      echo "Create a classic PAT with repo/public_repo scope and store it as PVTR_GITHUB_TOKEN." >&2
                      exit 1
                  fi

                  http_code="$(curl -sS -o /tmp/osps-token-check.json -w '%{http_code}' \
                      -H "Authorization: Bearer ${OSPS_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      https://api.github.com/rate_limit)"

                  if [ "${http_code}" != "200" ]; then
                      echo "PVTR_GITHUB_TOKEN authentication failed (HTTP ${http_code})." >&2
                      echo "Regenerate the token and ensure it has repo/public_repo access and is not expired." >&2
                      cat /tmp/osps-token-check.json >&2 || true
                      exit 1
                  fi

            - name: Run Open Source Project Security Baseline Scanner
              uses: revanite-io/osps-baseline-action@v1.3.3
              with:
                  owner: ${{ github.repository_owner }}
                  repo: ${{ github.event.repository.name }}
                  token: ${{ secrets.PVTR_GITHUB_TOKEN }}
                  catalog: osps-baseline-2026-02
                  upload-sarif: "true"
                  fail-on-error: "false"

            - name: Upload assessment results artifact
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: osps-assessment-results-${{ github.run_number }}
                  path: evaluation_results/
                  retention-days: 30
