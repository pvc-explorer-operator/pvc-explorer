---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pvcexplorers.pvcexplorer.io
spec:
  group: pvcexplorer.io
  names:
    kind: PVCExplorer
    listKind: PVCExplorerList
    plural: pvcexplorers
    shortNames:
    - pvcexp
    singular: pvcexplorer
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pvcName
      name: PVC
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.mount.readOnly
      name: ReadOnly
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PVCExplorer is the Schema for the pvcexplorers API.
          Each PVCExplorer manages a single agent pod that provides HTTP/WebSocket
          access to a PersistentVolumeClaim.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PVCExplorer.
            properties:
              explorerLabels:
                additionalProperties:
                  type: string
                description: explorerLabels are extra labels propagated onto the agent
                  Deployment and pods.
                type: object
              forceRW:
                default: true
                description: |-
                  forceRW, when true, mounts the PVC read-write when no consumers are present.
                  Automatically overridden to read-only when consumers are detected.
                type: boolean
              image:
                description: image is the container image for the agent pod.
                type: string
              mode:
                default: ScaledToZero
                description: mode controls whether the agent scales to zero when idle.
                enum:
                - ScaledToZero
                - Deployment
                type: string
              mountStrategy:
                description: mountStrategy configures how mount edge cases are handled.
                properties:
                  allowNodeAffinity:
                    default: true
                    description: |-
                      allowNodeAffinity permits the controller to add nodeAffinity to the agent
                      pod when the PVC is RWO and a consumer is running on a specific node.
                    type: boolean
                  autoDetect:
                    default: true
                    description: |-
                      autoDetect enables automatic consumer detection. When consumers are found
                      the agent is always mounted read-only, regardless of forceRW.
                    type: boolean
                  fallbackOnConflict:
                    default: Pending
                    description: |-
                      fallbackOnConflict controls behaviour when a RWO PVC has consumers on
                      multiple nodes simultaneously.
                    enum:
                    - Pending
                    type: string
                type: object
              port:
                default: 8081
                description: port is the HTTP port the agent listens on.
                format: int32
                type: integer
              pvcName:
                description: |-
                  pvcName is the name of the PersistentVolumeClaim to explore.
                  The PVC must exist in the same namespace as this PVCExplorer.
                minLength: 1
                type: string
              resources:
                description: resources specifies compute resource requests and limits
                  for the agent pod.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              scaling:
                description: scaling configures scale-to-zero behaviour.
                properties:
                  idleTimeout:
                    default: 10m
                    description: idleTimeout is the duration of inactivity before
                      the agent is scaled to zero.
                    type: string
                  provider:
                    default: auto
                    description: |-
                      provider selects the scaling backend. "auto" uses Knative if available,
                      otherwise falls back to native Deployment scaling.
                    enum:
                    - auto
                    - native
                    - knative
                    type: string
                  startupTimeout:
                    default: 60s
                    description: |-
                      startupTimeout is the maximum time to wait for the agent pod to pass its
                      /healthz probe after being woken.
                    type: string
                type: object
              subPath:
                description: subPath mounts only a sub-directory of the PVC rather
                  than its root.
                type: string
            required:
            - pvcName
            type: object
          status:
            description: status defines the observed state of PVCExplorer.
            properties:
              agent:
                description: agent captures metadata reported by the running agent
                  pod.
                properties:
                  cluster:
                    description: cluster is the cluster name reported by the agent.
                    type: string
                  pvcWatchEnabled:
                    description: pvcWatchEnabled indicates whether the agent has PVC-event
                      watching enabled.
                    type: boolean
                  version:
                    description: version is the Unix-timestamp build version string
                      from the agent binary.
                    type: string
                type: object
              agentEndpoint:
                description: agentEndpoint is the in-cluster HTTP address of the agent
                  service.
                type: string
              conditions:
                description: conditions represent the current state of the PVCExplorer
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHealthCheck:
                description: |-
                  lastHealthCheck is the timestamp of the last successful /healthz probe.
                  Empty when the agent is not running.
                format: date-time
                type: string
              mode:
                description: mode mirrors spec.mode as observed.
                enum:
                - ScaledToZero
                - Deployment
                type: string
              mount:
                description: mount describes the current PVC mount state.
                properties:
                  accessMode:
                    description: accessMode is the access mode of the underlying PVC
                      (ReadWriteOnce, etc.).
                    type: string
                  consumers:
                    description: consumers lists workload pods that are currently
                      mounting the tracked PVC.
                    items:
                      description: ConsumerInfo describes a workload pod that is currently
                        mounting the tracked PVC.
                      properties:
                        mountReadOnly:
                          description: mountReadOnly indicates whether the consumer
                            mounts the PVC read-only.
                          type: boolean
                        nodeName:
                          description: nodeName is the node the consumer pod is scheduled
                            on.
                          type: string
                        ownerKind:
                          description: ownerKind is the kind of the top-level owner
                            (Deployment, StatefulSet, Job, etc.).
                          type: string
                        ownerName:
                          description: ownerName is the name of the top-level owner.
                          type: string
                        podName:
                          description: podName is the name of the consumer pod.
                          type: string
                      required:
                      - podName
                      type: object
                    type: array
                  forceRWDeferred:
                    description: |-
                      forceRWDeferred is true when the agent is currently read-only due to active
                      consumers, but will be remounted read-write once they release the PVC.
                    type: boolean
                  readOnly:
                    description: readOnly indicates whether the agent currently has
                      the PVC mounted read-only.
                    type: boolean
                  strategy:
                    description: strategy is the mount strategy in use (Direct, NodeAffinity,
                      etc.).
                    type: string
                  targetNode:
                    description: |-
                      targetNode is the node the agent pod is (or must be) scheduled on. Non-empty
                      only when nodeAffinity is in use for RWO PVCs.
                    type: string
                type: object
              observedGeneration:
                description: |-
                  observedGeneration is the .metadata.generation that the status was last
                  reconciled against.
                format: int64
                type: integer
              phase:
                description: phase is the high-level lifecycle phase of the agent.
                enum:
                - ScaledToZero
                - Waking
                - Running
                - Failed
                - Pending
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
