# This rule is not used by the project pvc-explorer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to pvcexplorer.pvcexplorer.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pvc-explorer
    app.kubernetes.io/managed-by: kustomize
  name: pvcexplorer-viewer-role
rules:
- apiGroups:
  - pvcexplorer.pvcexplorer.io
  resources:
  - pvcexplorers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pvcexplorer.pvcexplorer.io
  resources:
  - pvcexplorers/status
  verbs:
  - get
